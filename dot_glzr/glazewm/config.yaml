general:
  # Launch Zebar on startup (kept from default).
  startup_commands: ["shell-exec zebar"]
  shutdown_commands: ["shell-exec taskkill /IM zebar.exe /F"]
  config_reload_commands: []

  focus_follows_cursor: false
  toggle_workspace_on_refocus: false

  # Move the cursor when focus changes between monitors (~ AeroSpace's
  # on-focused-monitor-changed move-mouse). Set trigger to 'window_focus'
  # to jump on every window focus change instead.
  cursor_jump:
    enabled: true
    trigger: "monitor_focus"

  hide_method: "cloak"
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  # AeroSpace ran with zero gaps. Top is kept non-zero to leave room for the
  # Zebar bar; bump it if windows render under the bar.
  inner_gap: "0px"
  outer_gap:
    top: "40px"
    right: "0px"
    bottom: "0px"
    left: "0px"

window_effects:
  focused_window:
    border:
      enabled: true
      color: "#8dbcff"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    transparency:
      enabled: false
      opacity: "95%"
  other_windows:
    border:
      enabled: true
      color: "#a1a1a1"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    transparency:
      enabled: false
      opacity: "0%"

window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      # The per-command '--shown-on-top' flag is ignored by the running WM
      # (set-floating always lands with the state_defaults value), so
      # on-top behavior for floated dialogs has to come from this default.
      shown_on_top: true
    fullscreen:
      maximized: false
      shown_on_top: false

# Pin monitors to fixed indices by machine ID so `bind_to_monitor` indices
# below stay stable across reconnects/reboots. Entry order = index (first
# entry is 0). Unlisted monitors are ordered after listed ones, by position.
# Run `glazewm query monitors` and take the middle segment of `devicePath`.
# Entries only take `machine_id` — there is no by-name binding; workspaces
# bind via `bind_to_monitor: <index>`.
# NOTE: absent monitors don't reserve an index — indices compact to the
# monitors currently present. The laptop panel is listed last because it's
# off when docked; undocked it's the only monitor and becomes 0 anyway.
monitors:
  - machine_id: "DELA196#4&806d26&0&UID8257" # 0: Dell portrait (work, left)
  - machine_id: "SAM711A#4&806d26&0&UID24645" # 1: Samsung ultrawide (work)
  - machine_id: "LEN414F#4&806d26&0&UID8388688" # 2: laptop panel

# AeroSpace workspaces: 1-5 plus named letter workspaces.
workspaces:
  - name: "1"
    bind_to_monitor: 0 # Dell portrait
  - name: "2"
    bind_to_monitor: 0 # Dell portrait
  - name: "3"
    bind_to_monitor: 1 # Samsung ultrawide
  - name: "4"
    bind_to_monitor: 1 # Samsung ultrawide
  - name: "5"
    bind_to_monitor: 1 # Samsung ultrawide
  - name: "A"
  - name: "B"
  - name: "C"
  - name: "E"
  - name: "O"
  # When a bound monitor is disconnected, the binding is ignored and the
  # workspace opens on the focused monitor instead.

window_rules:
  # --- ignore rules (kept from default) ---
  - commands: ["ignore"]
    match:
      - window_process: { equals: "zebar" }
      # GnuPG passphrase / PIN prompt (pinentry-qt/-basic/-w32). Leave it
      # fully unmanaged: when floated, GlazeWM snapshots the dialog's initial
      # pre-layout size and clamps it down to just the title bar. As an
      # ignored window it opens at its natural size and centers itself.
      - window_process: { regex: "(?i)^pinentry" }
      # System Properties (SystemPropertiesAdvanced.exe) and its Environment
      # Variables child dialog. Same clamping problem as pinentry above: as a
      # floating #32770 the dialog is sized before its layout runs and ends up
      # too short to show its bottom row of buttons. rundll32 hosts the same
      # dialog when it's opened via `sysdm.cpl,EditEnvironmentVariables`.
      - window_process: { regex: "(?i)^SystemProperties" }
      - window_process: { equals: "rundll32" }
        window_class: { equals: "#32770" }
      # WSLg: Linux GUI apps are hosted by the Remote Desktop client
      # (msrdc.exe). Leave them completely unmanaged by the WM.
      - window_process: { equals: "msrdc" }
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      - window_process: { equals: "PowerToys" }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_title: { equals: "Command Palette" }
        window_class: { equals: "WinUIDesktopWin32WindowClass" }
      - window_process: { equals: "PowerToys" }
        window_title: { regex: ".*? - Peek" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper" }
      - window_process: { equals: "EXCEL" }
        window_class: { not_regex: "XLMAIN" }
      - window_process: { equals: "WINWORD" }
        window_class: { not_regex: "OpusApp" }
      - window_process: { equals: "POWERPNT" }
        window_class: { not_regex: "PPTFrameClass" }

  # --- float transient dialogs/popups for all apps (save / open / download /
  #     print / loading, etc.). Keeps them out of the tiling grid while the WM
  #     still manages them (move, close, fullscreen via keybindings still work).
  #     '#32770' is the native Win32 common-dialog class used by Chrome,
  #     Explorer, Godot, installers, etc.; Firefox uses its own dialog class. ---
  - commands: ["set-floating --centered --shown-on-top"]
    match:
      # Explorer's #32770 dialogs are handled by the rule below (kept next to
      # their parent window instead of centered), so exclude them here.
      - window_class: { equals: "#32770" }
        window_process: { not_regex: "(?i)^explorer$" }
      - window_process: { equals: "firefox" }
        window_class: { equals: "MozillaDialogClass" }

  # Explorer's own transient windows: copy/move/delete progress
  # (OperationStatusWindow) and confirm/replace/in-use prompts (#32770).
  # Float them WITHOUT --centered so they keep the spot Windows gives them
  # (over the Explorer window that spawned them) and raise them above the
  # tiling grid. The main Explorer window is CabinetWClass and is untouched.
  - commands: ["set-floating --shown-on-top"]
    match:
      - window_process: { equals: "explorer" }
        window_class: { equals: "#32770" }
      - window_process: { equals: "explorer" }
        window_class: { equals: "OperationStatusWindow" }

  # Godot's editor, dialogs, and running-game windows all share one class
  # ('Engine') and process ('godot'); only the title separates them. The main
  # editor and project manager always carry 'Godot Engine' in the title;
  # popups (e.g. 'Connect a Signal to a Method') and the running game (e.g.
  # '[server] peer=1 ... (DEBUG)') never do. The two rules below are exact
  # complements, so every Godot window resolves to exactly one of float/tile.
  #
  # Godot sets the editor's full title a beat after the window is managed, so
  # at manage time it briefly lacks the marker and is floated here too. The
  # tile rule below corrects that on the next title_change; both rules must
  # watch title_change for the hand-off to work. set-tiling is idempotent, so
  # Godot's constant title rewrites are a no-op once the editor is tiled.
  - commands: ["set-floating --centered --shown-on-top"]
    on: ["manage", "title_change"]
    match:
      - window_process: { regex: "(?i)^godot" }
        window_title: { not_regex: "Godot Engine" }

  - commands: ["set-tiling"]
    on: ["manage", "title_change"]
    match:
      - window_process: { regex: "(?i)^godot" }
        window_title: { regex: "Godot Engine" }

  # --- app -> workspace assignments (your on-window-detected rules) ---

  # keepassxc -> 2
  # (KeePassXC popups are excluded — they float in place via the rule below)
  - commands: ["move --workspace 2"]
    match:
      - window_process: { equals: "KeePassXC" }
        window_title: { not_regex: "[Bb]rowser [Aa]ccess|Unlock" }

  # spotify + file explorer + foobar2000 -> 3
  # - commands: ["move --workspace 3"]
  #   match:
  #     - window_process: { equals: "Spotify" }
  #     - window_process: { equals: "explorer" }
  #     - window_process: { equals: "foobar2000" }

  # KeePassXC browser-access / unlock popups: keep them on whatever workspace
  # they appear on, floated at their natural size/position and always on top.
  - commands: ["set-floating --centered=false --shown-on-top=true"]
    match:
      - window_process: { equals: "KeePassXC" }
        window_title: { regex: "[Bb]rowser [Aa]ccess|Unlock" }

  # comms: outlook + slack + teams -> 2
  - commands: ["move --workspace 2"]
    match:
      - window_process: { equals: "OUTLOOK" } # new Outlook is 'olk'
      - window_process: { equals: "olk" }
      - window_process: { equals: "Slack" }
      - window_process: { equals: "ms-teams" } # classic Teams is 'Teams'
      - window_process: { equals: "Teams" }

  # browsers -> B. Exclude Chrome's native common dialogs (#32770, e.g. the
  # Save As / Open File picker) so they stay on the workspace that spawned
  # them instead of being yanked to B when Chrome lives elsewhere.
  # - commands: ["move --workspace B"]
  #   match:
  #     # - window_process: { equals: 'firefox' }
  #     - window_process: { equals: "chrome" }
  #       window_class: { not_regex: "^#32770$" }

  # terminal (WezTerm) -> C
  # - commands: ['move --workspace C']
  #   match:
  #     - window_process: { equals: 'wezterm-gui' }

  # MS Office -> O
  - commands: ["move --workspace O"]
    match:
      - window_process: { equals: "POWERPNT" }
      - window_process: { equals: "WINWORD" }
      - window_process: { equals: "EXCEL" }

  # editors -> E
  - commands: ["move --workspace E"]
    match:
      - window_process: { equals: "Code" } # VS Code
      - window_process: { equals: "neovide" }
      # - window_process: { equals: "zed" }

binding_modes:
  # Arrow/HJKL resize mode (bonus; enter with alt+r).
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

  # Your AeroSpace 'service' mode (enter with alt+period).
  - name: "service"
    keybindings:
      - commands: ["wm-reload-config", "wm-disable-binding-mode --name service"]
        bindings: ["escape"]
      - commands: ["toggle-floating", "wm-disable-binding-mode --name service"]
        bindings: ["f", "e"]

keybindings:
  # --- focus (alt + arrows) ---
  - commands: ["focus --direction left"]
    bindings: ["alt+left"]
  - commands: ["focus --direction down"]
    bindings: ["alt+down"]
  - commands: ["focus --direction up"]
    bindings: ["alt+up"]
  - commands: ["focus --direction right"]
    bindings: ["alt+right"]

  # --- move window (alt + shift + arrows) ---
  - commands: ["move --direction left"]
    bindings: ["alt+shift+left"]
  - commands: ["move --direction down"]
    bindings: ["alt+shift+down"]
  - commands: ["move --direction up"]
    bindings: ["alt+shift+up"]
  - commands: ["move --direction right"]
    bindings: ["alt+shift+right"]

  # --- resize (minus/equal = width, backtick/backslash = height) ---
  - commands: ["resize --width -2%"]
    bindings: ["alt+shift+oem_minus"]
  - commands: ["resize --width +2%"]
    bindings: ["alt+shift+oem_plus"]
  - commands: ["resize --height -2%"]
    bindings: ["alt+shift+oem_3"] # backtick `
  - commands: ["resize --height +2%"]
    bindings: ["alt+shift+oem_5"] # backslash \
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["alt+r"]

  # --- layout: toggle split direction (your alt-slash) ---
  # Note: AeroSpace's accordion layout (alt-comma) has no GlazeWM equivalent.
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+oem_2"] # slash /

  # --- workspace switching ---
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace A"]
    bindings: ["alt+a"]
  - commands: ["focus --workspace B"]
    bindings: ["alt+b"]
  - commands: ["focus --workspace C"]
    bindings: ["alt+c"]
  - commands: ["focus --workspace E"]
    bindings: ["alt+e", "alt+k"] # you mapped both e and k to E
  - commands: ["focus --workspace O"]
    bindings: ["alt+o"]

  # --- move focused window to workspace (focus stays, like AeroSpace) ---
  - commands: ["move --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace 5"]
    bindings: ["alt+shift+5"]
  - commands: ["move --workspace A"]
    bindings: ["alt+shift+a"]
  - commands: ["move --workspace B"]
    bindings: ["alt+shift+b"]
  - commands: ["move --workspace C"]
    bindings: ["alt+shift+c"]
  - commands: ["move --workspace E"]
    bindings: ["alt+shift+e", "alt+shift+k"]
  - commands: ["move --workspace O"]
    bindings: ["alt+shift+o"]

  # --- workspace navigation ---
  - commands: ["focus --recent-workspace"]
    bindings: ["alt+tab"] # overrides Windows alt-tab; see notes
  - commands: ["focus --next-active-workspace"]
    bindings: ["alt+s"]
  - commands: ["focus --prev-active-workspace"]
    bindings: ["alt+d"]

  # --- move current workspace to the other monitor ---
  - commands: ["move-workspace --direction right"]
    bindings: ["alt+shift+tab"]

  # --- service mode (your alt-period) ---
  - commands: ["wm-enable-binding-mode --name service"]
    bindings: ["alt+oem_period"]

  # --- window state ---
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+shift+space"]
  - commands: ["toggle-tiling"]
    bindings: ["alt+t"]
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+f"]
  - commands: ["toggle-minimized"]
    bindings: ["alt+m"]
  - commands: ["wm-cycle-focus"]
    bindings: ["alt+space"]
  - commands: ["close"]
    bindings: ["alt+shift+q"]

  # --- pause WM (~ AeroSpace text-editing mode) ---
  - commands: ["wm-toggle-pause"]
    bindings: ["alt+escape", "alt+shift+p"]

  # --- WM control ---
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]
  - commands: ["wm-redraw"]
    bindings: ["alt+shift+w"]
  - commands: ["wm-exit"]
    bindings: ["alt+shift+x"]

  # --- launch terminal (WezTerm) ---
  - commands: ["shell-exec wezterm-gui"]
    bindings: ["alt+enter"]
