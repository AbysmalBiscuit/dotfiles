# Starship modules
## Basic prompt features
[battery]
disabled = true
format = "[\b $symbol$percentage]($style bg:bg_time) "
unknown_symbol = "?"
display = [
    { threshold = 10, style = 'bold red' },
    { threshold = 30, style = 'bold orange' },
    { threshold = 50, style = 'bold yellow' },
    { threshold = 80, style = 'bold green1' },
    { threshold = 100, style = 'bold green' },
]

[character]
disabled = false
# Note the use of Catppuccin color 'peach'
# success_symbol = "[[¾░äø](green) ÔØ»](peach)"
# error_symbol = "[[¾░äø](red) ÔØ»](peach)"
# vimcmd_symbol = "[¾░äø ÔØ«](subtext1)" # For use with zsh-vi-mode
#
success_symbol = '[\[I\]ÔØ»](bold green)'
error_symbol = '[\[I\]ÔØ»](bold red)'
vimcmd_symbol = '[\[N\]ÔØ»](bold blue)'
vimcmd_replace_one_symbol = '[\[R\]ÔØ»](bold red)'
vimcmd_replace_symbol = '[\[R\]ÔØ»](bold red)'
# vimcmd_visual_symbol = '[ÔØ«](bold #cba6f7)'
vimcmd_visual_symbol = '[\[V\]ÔØ»](bold #cba6f7)'

format = '$symbol '
# success_symbol = "[ÔùÄ](bold italic bright-yellow)"
# error_symbol = "[Ôùï](italic purple)"
# vimcmd_symbol = "[Ôûá](italic dimmed green)"
# not supported in zsh
# vimcmd_replace_one_symbol = "Ôùî"
# vimcmd_replace_symbol = "Ôûí"
# vimcmd_visual_symbol = "Ôû╝"

[cmd_duration]
disabled = false
show_milliseconds = true
format = "[\b ¯½┤  in $duration]($style) "
# style = "bg:lavender"
style = "fg:magenta bg:bg_time"
show_notifications = true
min_time_to_notify = 45000
# min_time_to_notify = 100
min_time = 300

[directory]
disabled = false
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = "¾░î¥ "

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
