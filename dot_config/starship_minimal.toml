# [](fg:bg_dark1)](bg:bg_dark1) """

pipestatus_format = """\n[\\[$pipestatus\\] => \
[$symbol($status)( $common_meaning)( $signal_name)]($style)\
[](fg:bg_dark1)](bg:bg_dark1) """

pipestatus_separator = '[|](bg:bg_dark1)'

# pipestatus_segment_format = """\
# [](fg:bg_dark1)\
# [$symbol($status)( $common_meaning)( $signal_name)]($style)\
# [](fg:bg_dark1)"""
