# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 30
command_timeout = 200
continuation_prompt = "[▸▹ ](dimmed white)"

# Sets user-defined palette
# Palettes must be defined _after_ this line
# palette = "catppuccin_macchiato"

palette = 'tokyo_night_moon'
# palette = 'catppuccin_mocha'

format = """
[░▒▓](#a2aed2)\
[ $os ](bg:#a2aed2 fg:#090c0c)\
[](bg:#768ff0 fg:#a3aed2)\
$directory\
[](fg:#768ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394259 bg:#212736)\
$shell\
[](fg:#212735 bg:bg_dark)\
$time\
[](fg:bg_dark)\
$battery\
$memory_usage\
$cmd_duration\
$status\
\n$character"""


# Starship modules
## Basic prompt features
[battery]
disabled = true
format = "[\b $symbol$percentage]($style bg:bg_time) "
unknown_symbol = "?"
display = [
    { threshold = 10, style = 'bold red' },
    { threshold = 30, style = 'bold orange' },
    { threshold = 50, style = 'bold yellow' },
    { threshold = 80, style = 'bold green1' },
    { threshold = 100, style = 'bold green' },
]

[character]
disabled = false
# Note the use of Catppuccin color 'peach'
# success_symbol = "[[󰄛](green) ❯](peach)"
# error_symbol = "[[󰄛](red) ❯](peach)"
# vimcmd_symbol = "[󰄛 ❮](subtext1)" # For use with zsh-vi-mode
#
success_symbol = '[\[I\]❯](bold green)'
error_symbol = '[\[I\]❯](bold red)'
vimcmd_symbol = '[\[N\]❯](bold blue)'
vimcmd_replace_one_symbol = '[\[R\]❯](bold red)'
vimcmd_replace_symbol = '[\[R\]❯](bold red)'
# vimcmd_visual_symbol = '[❮](bold #cba6f7)'
vimcmd_visual_symbol = '[\[V\]❯](bold #cba6f7)'

format = '$symbol '
# success_symbol = "[◎](bold italic bright-yellow)"
# error_symbol = "[○](italic purple)"
# vimcmd_symbol = "[■](italic dimmed green)"
# not supported in zsh
# vimcmd_replace_one_symbol = "◌"
# vimcmd_replace_symbol = "□"
# vimcmd_visual_symbol = "▼"

[cmd_duration]
disabled = false
show_milliseconds = true
format = "[\b   in $duration]($style) "
# style = "bg:lavender"
style = "fg:magenta bg:bg_time"
show_notifications = true
min_time_to_notify = 45000
# min_time_to_notify = 100
min_time = 300

[directory]
disabled = false
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = "󰌾 "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[time]
disabled = false
time_format = "%R"                                      # Hour:Minute Format
style = "bg:bg_dark"
format = '[[  $time ](fg:fg_time bg:bg_dark)]($style)'


