# vim:filetype=tmux
# psmux config — ported from ~/.tmux.conf. psmux reads this file first
# (~/.psmux.conf > ~/.psmuxrc > ~/.tmux.conf), so the tmux config stays
# untouched for real tmux (e.g. under WSL).
#
# Dropped from the tmux version (all depend on POSIX sh / bash scripts):
#   - TPM + upstream catppuccin/resurrect/continuum/cpu (replaced by the
#     PowerShell ports from github.com/psmux/psmux-plugins below)
#   - tmux-sessionizer binding, tmux-spotify-info, tmux-weather (no port),
#     cpu-interpolate-format.sh, the two-row status-format block

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep manually-set window names (Claude Code's terminal-title escapes and
# process tracking would otherwise overwrite them).
setw -g automatic-rename off
set -g allow-rename off

# Claude Code degrades its UI palette when it detects tmux ($TMUX is set in
# psmux panes too); this forces truecolor so the UI colors stay correct.
set-environment -g CLAUDE_CODE_TMUX_TRUECOLOR 1

# Publish active-pane edges + cwd basename to the outer terminal title so
# WezTerm can hand Ctrl+Arrow off to its own pane navigation (see
# innerHandles in ~/.wezterm.lua). nvim publishes @nvim_edges itself.
set -g @nvim_edges "LRUD"
set -g set-titles on
set -g set-titles-string "tmux:#{?#{&&:#{pane_at_left},#{m:*L*,#{@nvim_edges}}},L,}#{?#{&&:#{pane_at_right},#{m:*R*,#{@nvim_edges}}},R,}#{?#{&&:#{pane_at_top},#{m:*U*,#{@nvim_edges}}},U,}#{?#{&&:#{pane_at_bottom},#{m:*D*,#{@nvim_edges}}},D,} #{b:pane_current_path}"

# Prefix: Ctrl+/ — many terminals (incl. WezTerm) send 0x1f for it, which
# arrives as C-_, so register both.
unbind C-b
set -g prefix C-/
set -g prefix2 C-_

unbind r
bind r source-file ~/.psmux.conf \; display-message "psmux.conf reloaded"

set -g mouse on
# tmux-like mouse selection: drag to select; double-click = word, triple-click
# = line; releasing the drag copies to the clipboard and clears the highlight.
set -g pwsh-mouse-selection on
set-window-option -g mode-keys vi
set-option -s escape-time 10
set-option -g focus-events on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -n C-Pageup previous-window
bind -n C-Pagedown next-window

# Smart pane switching with awareness of Vim splits. The Linux config shells
# out to `ps` for this; here #{pane_current_command} + if-shell -F does it
# without a shell. Keys are sent into vim/nvim panes so Navigator.nvim can
# move between splits (and publish @nvim_edges for WezTerm); otherwise psmux
# switches panes directly.
bind -n C-Left  if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys C-Left'  'select-pane -L'
bind -n C-Down  if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys C-Down'  'select-pane -D'
bind -n C-Up    if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys C-Up'    'select-pane -U'
bind -n C-Right if-shell -F '#{m:*vim*,#{pane_current_command}}' 'send-keys C-Right' 'select-pane -R'

bind-key -T copy-mode-vi C-Left select-pane -L
bind-key -T copy-mode-vi C-Down select-pane -D
bind-key -T copy-mode-vi C-Up select-pane -U
bind-key -T copy-mode-vi C-Right select-pane -R

# Move the current window to a typed index, shifting occupants right.
bind . command-prompt -T target -p "move window to index:" { move-window -b -t "%%" }

# New panes/windows open in the current directory
bind M-c new-window -c "#{pane_current_path}"
bind M-'"' split-window -c "#{pane_current_path}"
bind M-% split-window -h -c "#{pane_current_path}"

# Fuzzy project picker (PowerShell port; see ~/.local/bin/tmux-sessionizer.ps1)
bind-key f new-window 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.local/bin/tmux-sessionizer.ps1"'

# Plugins (PowerShell ports; managed by PPM — Prefix+I install, Prefix+U update)
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-theme-catppuccin'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-continuum'

# Theme (note: the port uses @catppuccin-flavor, not @catppuccin_flavor)
set -g @catppuccin-flavor 'mocha'
set -g @catppuccin-show-powerline 'on'
set -g @catppuccin-window-style 'rounded'

# Auto-restore the last saved environment when the psmux server starts
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.psmux/plugins/ppm/ppm.ps1'

# ---------------------------------------------------------------------------
# Catppuccin v2 "rounded" look, rebuilt on top of the theme port (which only
# does powerline blocks). These run after ppm so they win over the theme.
# psmux has no status-format[] arrays, so the tmux two-row layout collapses
# to one row: pills on the left, modules on the right.
# Mocha palette: base #1e1e2e crust #11111b text #cdd6f4 surface0 #313244
#                surface1 #45475a overlay2 #9399b2 mauve #cba6f7
#                green #a6e3a1 peach #fab387 maroon #eba0ac blue #89b4fa
#                yellow #f9e2af
# ---------------------------------------------------------------------------
set -g status-position top
set -g status-justify left
set -g status-left ""
set -g status-left-length 100
set -g status-right-length 150
set -g window-status-separator " "
set -g window-status-last-style default

# Window pills: rounded caps, number segment + name segment (shows #W; names
# stick because automatic-rename is off)
set -g window-status-format "#[fg=#9399b2,bg=#1e1e2e]#[fg=#1e1e2e,bg=#9399b2]#I#[fg=#cdd6f4,bg=#313244] #W #[fg=#313244,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#cba6f7,bg=#1e1e2e]#[fg=#11111b,bg=#cba6f7]#I#[fg=#cdd6f4,bg=#45475a] #W #[fg=#45475a,bg=#1e1e2e]"

# Right modules (application, date/time, session — spotify/weather have
# no Windows equivalent).
# Single set: psmux's `set -ga` trims trailing spaces off appended chunks,
# which eats the gaps between pills.
set -g status-right "#[fg=#eba0ac,bg=#1e1e2e]#[fg=#11111b,bg=#eba0ac]󰀻 #[fg=#cdd6f4,bg=#313244] #{pane_current_command} #[fg=#89b4fa,bg=#313244]#[fg=#11111b,bg=#89b4fa]󰃰 #[fg=#cdd6f4,bg=#313244] %Y-%m-%d %H:%M #[fg=#a6e3a1,bg=#313244]#[fg=#11111b,bg=#a6e3a1]󰆍 #[fg=#cdd6f4,bg=#313244] #S "
